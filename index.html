<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Draftsman</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header id="app-header">
        <h1 class="app-title">Draftsman</h1>

        <div class="header-controls">
            <button id="btn-upload"  class="btn btn-primary">Upload files</button>
            <button id="btn-export"  class="btn" disabled>Export CSV</button>
            <button id="btn-key"     class="btn" disabled>Key</button>

            <label class="toggle-label">
        <input type="checkbox" id="toggle-working-days" checked />
        Working days only
      </label>

            <label class="sort-label" for="sort-select">Sort by</label>
            <select id="sort-select">
        <option value="">— manual order —</option>
        <option value="client">Client</option>
        <option value="initiative">Initiative</option>
        <option value="priority">Priority</option>
        <option value="teamPriority">Team Priority</option>
        <option value="jobName">Job Name</option>
        <option value="startDate">Start date</option>
        <option value="endDate">End date</option>
      </select>
        </div>
    </header>

    <!-- ── Upload pop-over ──────────────────────────────────────────────── -->
    <div id="upload-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Upload files">
        <div class="upload-popover">
            <button class="close-btn" id="btn-close-upload" aria-label="Close">&times;</button>
            <h2>Upload CSV files</h2>

            <div class="upload-slots">
                <div class="upload-slot">
                    <p class="slot-label">Stage templates</p>
                    <div class="drop-zone" id="drop-templates">
                        <p>Drop here or</p>
                        <input type="file" id="file-input-templates" accept=".csv" hidden />
                        <button class="btn" id="btn-browse-templates">Browse&hellip;</button>
                    </div>
                    <p class="slot-status" id="status-templates"><em>not loaded</em></p>
                </div>

                <div class="upload-slot">
                    <p class="slot-label">Stage dates</p>
                    <div class="drop-zone" id="drop-dates">
                        <p>Drop here or</p>
                        <input type="file" id="file-input-dates" accept=".csv" hidden />
                        <button class="btn" id="btn-browse-dates">Browse&hellip;</button>
                    </div>
                    <p class="slot-status" id="status-dates"><em>not loaded</em></p>
                </div>
            </div>

            <div id="upload-errors" class="upload-errors" role="alert" aria-live="polite"></div>

            <button class="btn btn-primary" id="btn-load" disabled>Load planner</button>
        </div>
    </div>

    <!-- ── Main workboard ──────────────────────────────────────────────── -->
    <main id="workboard" class="hidden">

        <!-- Bar visual legend (#29) -->
        <div class="bar-legend">
            <span class="legend-item"><span class="legend-swatch swatch-actual"></span>Actual dates</span>
            <span class="legend-item"><span class="legend-swatch swatch-inprog"></span>In progress</span>
            <span class="legend-item"><span class="legend-swatch swatch-planned"></span>Planned only</span>
            <span class="legend-item"><span class="legend-swatch swatch-blocked"></span>Blocked</span>
        </div>

        <!-- Sticky table header -->
        <div id="workboard-header" class="workboard-header">
            <div class="col-jobs">
                <span class="col col-drag"></span>
                <span class="col col-job-key">Key</span>
                <span class="col col-job-name">Job&nbsp;Name</span>
                <span class="col col-client">Client</span>
                <span class="col col-initiative">Initiative</span>
                <span class="col col-priority">P</span>
                <span class="col col-team-priority">TP</span>
            </div>
            <div class="col-gantt" id="gantt-header">
                <!-- Rendered by gantt.js -->
            </div>
        </div>

        <!-- Scrollable job rows -->
        <div id="job-rows">
            <!-- Rendered by app.js / gantt.js -->
        </div>

    </main>

    <!-- ── Stage key pop-over ───────────────────────────────────────────── -->
    <div id="key-popover" class="key-popover hidden" role="dialog" aria-label="Stage key">
        <div id="stage-key" class="stage-key">
            <!-- Rendered by gantt.js renderKey -->
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
